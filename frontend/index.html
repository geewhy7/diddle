<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="color-scheme" content="light dark" />
  <title>Diddle — daily word ladder</title>
  <link rel="stylesheet" href="diddle.css?v=1" />
  <style>
    /* Production overrides: remove design-tool surround, fill Telegram viewport */
    body { background: transparent; padding: 0; display: block; }
    #root { height: 100%; display: flex; flex-direction: column; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Telegram Mini App SDK (must load before app code reads tg.initData) -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- React + Babel (pinned) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- engine (plain JS, no Babel needed) -->
  <script src="engine.js?v=1"></script>

  <!-- components → screens → app (load order matters: each exports to window) -->
  <script type="text/babel" src="components.jsx?v=1"></script>
  <script type="text/babel" src="screens.jsx?v=1"></script>
  <script type="text/babel" src="app.jsx?v=1"></script>
</body>
</html>
